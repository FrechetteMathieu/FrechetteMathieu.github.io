<!DOCTYPE html>

<html>

    <head>
        <meta charset="utf-8">

        <title>Démonstration Flexbox</title>
        <link rel="stylesheet" href="styles/demo_flexbox.css">
    </head>

    <body>

        <div class='container' id='container_entete'>
            
            <div class="item" id="item_entete_gauche">
                <h1>Mathieu Fréchette</h1>

                <figure class="quote" width="50px">
                    <blockquote>
                        If you only read the books that everyone else is reading, you can only think what everyone else is thinking.
                    </blockquote>
                    <figcaption>
                        - Haruki Murakami, <cite>Norwegian Wood</cite> 
                    </figcaption>     
                </figure>
                
            </div>
            
            <div class="item" id="item_entete_droite">
                <img src="img/Avatar_small.png" title="Moi en vacances" alt="Ma photo de profil" height="200px">
            </div>

        </div>

        <hr>

    </body>

</html>
